server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_verify off;
    }

    location /generate-captcha {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_verify off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
